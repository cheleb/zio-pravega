name: QA Reports


on:
  pull_request:
    types: [ready_for_review, synchronize]
    branches: [master]
    paths:
      - '**/*.sbt'
      - 'modules/**'
jobs:
  reports:
    permissions: 
      pull-requests: read

    if: github.ref_name == 'master' || ! ( github.event.sender.login == 'renovate' || github.event.pull_request.draft)
    environment: Codecov
    runs-on: ubuntu-latest   
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: "23"
          distribution: "zulu"
          cache: sbt
      - name: Install sbt
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41
      - name: Run coverage test
      # Scala 3 is not fully supported for coverage yet
        run: sbt "++ 3; coverage; test; coverageReport; coverageAggregate"
      - name: "Upload coverage to Codecov"
        uses: "codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2"
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
      - name: SonarCloud scan 
        uses: sonarsource/sonarqube-scan-action@d899ed299620f557b0175710b8dedbdd7c31213d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
