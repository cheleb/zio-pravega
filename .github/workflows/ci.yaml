name: Scala CI

on:
  push:
    tags-ignore:
      - "v*"
    branches:
      - "master"
  pull_request:
    branches: [master]
  workflow_dispatch:
jobs:
  build:
    name: build, test, and website
    runs-on: ubuntu-latest   
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@e270a5644de745094f27105b3ccbb9eea1758769
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: "23"
          distribution: "zulu"
          cache: sbt
      - name: Install sbt
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41
      - name: Run tests crosscompile
        run:  sbt + pravega/test      
      - name: Build website
        run:  sbt website

          